spring.application.name=api-gateway
server.port=8080

# CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

# Rota localidades
spring.cloud.gateway.routes[0].id=localidades-service
spring.cloud.gateway.routes[0].uri=lb://LOCALIDADES-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/localidades/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Rota noticias
spring.cloud.gateway.routes[1].id=noticias-service
spring.cloud.gateway.routes[1].uri=lb://NOTICIAS-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/noticias/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/